<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
</head>
<body>

<h2>Role: {{ role }}</h2>
<h2>{{ result }}</h2>

{% if reasons %}
<h3>Reasons:</h3>
<ul>
    {% for r in reasons %}
        <li>{{ r }}</li>
    {% endfor %}
</ul>
{% endif %}

{% if suggestions %}
<h3>Suggestions:</h3>
<ul>
    {% for s in suggestions %}
        <li>{{ s }}</li>
    {% endfor %}
</ul>
{% endif %}

<a href="/">Go Back</a>

</body>
</html>
